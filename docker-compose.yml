services:
  backend:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    environment:
      XIAOMING_SERVER_PORT: ${XIAOMING_SERVER_PORT:-8080}
      XIAOMING_DATABASE_URL: ${XIAOMING_DATABASE_URL:-}
      XIAOMING_SENTINEL_CACHE_TTL: ${XIAOMING_SENTINEL_CACHE_TTL:-300s}
      XIAOMING_JWT_SECRET: ${XIAOMING_JWT_SECRET:-}
      XIAOMING_JWT_EXPIRATION: ${XIAOMING_JWT_EXPIRATION:-24h}
      XIAOMING_ENCRYPTION_KEY: ${XIAOMING_ENCRYPTION_KEY:-}
      XIAOMING_CHATGPT_BASE_URL: ${XIAOMING_CHATGPT_BASE_URL:-https://chatgpt.com}
      XIAOMING_SIDECAR_URL: ${XIAOMING_SIDECAR_URL:-http://127.0.0.1:3100}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chatgpt_proxy
      POSTGRES_PASSWORD: dev_secret
      POSTGRES_DB: chatgpt_proxy
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
