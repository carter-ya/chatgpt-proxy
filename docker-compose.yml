services:
  backend:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    environment:
      CHATGPT_PROXY_SERVER_PORT: ${CHATGPT_PROXY_SERVER_PORT:-8080}
      CHATGPT_PROXY_DATABASE_URL: ${CHATGPT_PROXY_DATABASE_URL:-}
      CHATGPT_PROXY_SENTINEL_CACHE_TTL: ${CHATGPT_PROXY_SENTINEL_CACHE_TTL:-300s}
      CHATGPT_PROXY_JWT_SECRET: ${CHATGPT_PROXY_JWT_SECRET:-}
      CHATGPT_PROXY_JWT_EXPIRATION: ${CHATGPT_PROXY_JWT_EXPIRATION:-24h}
      CHATGPT_PROXY_ENCRYPTION_KEY: ${CHATGPT_PROXY_ENCRYPTION_KEY:-}
      CHATGPT_PROXY_CHATGPT_BASE_URL: ${CHATGPT_PROXY_CHATGPT_BASE_URL:-https://chatgpt.com}
      CHATGPT_PROXY_SIDECAR_URL: ${CHATGPT_PROXY_SIDECAR_URL:-http://127.0.0.1:3100}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "${CHATGPT_PROXY_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: chatgpt_proxy
      POSTGRES_PASSWORD: dev_secret
      POSTGRES_DB: chatgpt_proxy
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
